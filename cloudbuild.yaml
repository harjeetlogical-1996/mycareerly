# Google Cloud Build pipeline: build Docker image → push to Artifact Registry → deploy to Cloud Run.
# Triggered on every push to the main branch (configured once in GCP Console).
#
# Substitutions come from the build trigger. All SECRET values are resolved at deploy time
# from Google Secret Manager by the Cloud Run revision, NOT baked into the image.

substitutions:
  _REGION: us-central1
  _SERVICE: mycareerly
  _REPO: mycareerly

steps:
  # 1. Build the image, tag with both commit SHA and :latest
  - name: "gcr.io/cloud-builders/docker"
    id: Build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push both tags
  - name: "gcr.io/cloud-builders/docker"
    id: Push-SHA
    args: [push, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"]
  - name: "gcr.io/cloud-builders/docker"
    id: Push-Latest
    args: [push, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"]

  # 3. Deploy to Cloud Run. Env vars + secrets are wired on first manual deploy;
  #    subsequent deploys reuse them.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 1Gi
      - --cpu
      - "1"
      - --min-instances
      - "0"
      - --max-instances
      - "4"
      - --concurrency
      - "80"
      - --timeout
      - "300"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: 1800s
